name: Build and deploy Python app to Azure Web App

env:
  AZURE_WEBAPP_NAME: authenticai-gjbfguhud8a8gffv
  PYTHON_VERSION: '3.10'

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r --exclude="venv/*" --exclude="*.db" --exclude=".git/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CABBC25DD3DB442784F512C4A61E8AC9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_26341344A1F3426BB9D8C55C64D97B7D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D0A7ACE9047849859A24B3581DDB0B5C }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .
